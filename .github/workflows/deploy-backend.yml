name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://gasreading-backend.azurewebsites.net/api
        run: |
          npm install
          npm run build

      - name: Copy frontend build into Django
        run: cp -r frontend/dist backend/frontend_build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies into project
        working-directory: backend
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Collect static files
        working-directory: backend
        env:
          SECRET_KEY: placeholder-for-collectstatic
          DEBUG: "False"
          AZURE_STORAGE_ACCOUNT_NAME: gasreadingdk2024
          AZURE_BLOB_CONTAINER_NAME: meter-images
          AZURE_COMMUNICATION_ENDPOINT: https://gasreading-acs.unitedstates.communication.azure.com
          EMAIL_SENDER_ADDRESS: placeholder@example.com
          PYTHONPATH: .python_packages/lib/site-packages
        run: python manage.py collectstatic --no-input

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: gasreading-backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
